{% load static %}
<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Infraestructura | Geoportal</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="{% static 'css/geoportal.css' %}" rel="stylesheet"></head><body class="geoportal-body"><main class="container py-4"><div class="d-flex justify-content-between align-items-center mb-3"><div><h1 class="h3">Catálogo de infraestructura</h1><p class="text-muted">Capas geográficas disponibles para el operativo.</p></div><a class="btn btn-primary" href="{% url 'mapas:operations_map' %}">Abrir mapa</a></div><div class="row g-3">{% for resource in resources %}<div class="col-md-4"><div class="surface-card h-100"><div class="card-body"><h2 class="h5">{{ resource.label }}</h2><p class="display-6">{{ resource.count }}</p><p class="text-muted">registro(s) cargado(s)</p><a class="btn btn-sm btn-outline-secondary" href="{% url 'mapas:resource_layers_geojson' %}?layer={{ resource.layer }}">Consultar capa GeoJSON</a><a class="btn btn-sm btn-outline-primary ms-1" href="/admin/">Administrar</a></div></div></div>{% endfor %}</div></main></body></html>
